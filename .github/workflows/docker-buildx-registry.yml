name: Build & Push Docker image (Generic Registry, temp-tags manifest)

on:
    schedule:
        - cron: "0 0 * * 2,5"
    push:
        branches: ["main"]
        tags: ["v*"]
    pull_request:
    workflow_dispatch:

permissions:
    contents: read

concurrency:
    group: docker-registry-${{ github.ref }}
    cancel-in-progress: true

env:
    IMAGE_REGISTRY: ${{ vars.IMAGE_REGISTRY }}
    IMAGE_NAMESPACE: ${{ vars.IMAGE_NAMESPACE }}
    IMAGE_NAME:

jobs:
    meta:
        runs-on: ubuntu-latest
        outputs:
            tags: ${{ steps.meta.outputs.tags }}
            labels: ${{ steps.meta.outputs.labels }}
        steps:
            - name: Docker metadata
              id: meta
              uses: docker/metadata-action@master
              with:
                  images: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME || github.event.repository.name }}
                  tags: |
                      type=ref,event=branch
                      type=raw,value=latest,enable={{is_default_branch}}

    build:
        needs: meta
        strategy:
            fail-fast: false
            matrix:
                include:
                    - short: amd64
                      platform: linux/amd64
                      runs_on: ubuntu-24.04
                    - short: arm64
                      platform: linux/arm64
                      runs_on: ubuntu-24.04-arm
        runs-on: ${{ matrix.runs_on }}
        steps:
            - uses: actions/checkout@main
              with:
                  fetch-depth: 0

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@master
              with: { install: true }

            - name: Login to target registry
              if: github.event_name != 'pull_request'
              uses: docker/login-action@master
              with:
                  registry: ${{ env.IMAGE_REGISTRY }}
                  username: ${{ secrets.REGISTRY_USERNAME }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Build & push (native ${{ matrix.platform }})
              uses: docker/build-push-action@master
              with:
                  context: .
                  file: ./Dockerfile
                  build-args: |
                      APP_ENV=production
                  platforms: ${{ matrix.platform }} # 原生构建，无 QEMU
                  push: ${{ github.event_name != 'pull_request' }}
                  # 临时标签，用于后续合成 manifest
                  tags: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME || github.event.repository.name }}:${{ github.sha }}-${{ matrix.short }}
                  labels: ${{ needs.meta.outputs.labels }}
                  # 官方 runner 用 gha 缓存即可
                  cache-from: type=gha
                  cache-to: type=gha,version=2,mode=min
                  sbom: true
                  provenance: true

    manifest:
        needs: [meta, build]
        runs-on: ubuntu-24.04
        if: github.event_name != 'pull_request'
        steps:
            - name: Login to target registry
              uses: docker/login-action@master
              with:
                  registry: ${{ env.IMAGE_REGISTRY }}
                  username: ${{ secrets.REGISTRY_USERNAME }}
                  password: ${{ secrets.REGISTRY_PASSWORD }}

            - name: Create & push multi-arch manifest
              env:
                  IMAGE: ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/${{ env.IMAGE_NAME || github.event.repository.name }}
                  TAGS: ${{ needs.meta.outputs.tags }}
              run: |
                  set -Eeuxo pipefail

                  # 直接把 metadata 的“完整引用”作为 --tag 传入；去掉空行与首尾空白
                  TAG_ARGS=""
                  while IFS= read -r tag; do
                    tag="$(echo "$tag" | xargs)"    # trim
                    [ -z "$tag" ] && continue
                    TAG_ARGS="$TAG_ARGS --tag $tag"
                  done <<< "$TAGS"

                  # 合成多架构 manifest（使用两个临时标签作为来源）
                  docker buildx imagetools create \
                    $TAG_ARGS \
                    "$IMAGE:${GITHUB_SHA}-amd64" \
                    "$IMAGE:${GITHUB_SHA}-arm64"

            - name: Inspect (debug)
              run: |
                  first_tag="$(printf "%s\n" "${{ needs.meta.outputs.tags }}" | head -n1)"
                  docker buildx imagetools inspect "$first_tag"
